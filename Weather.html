<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Weather App</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
   <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  </head>
  <body>
    <main class="main_container">
      <header class="container">
        <input class="city-input" placeholder="Search City" type="text">
        <button class="search-btn">
          <span class="material-symbols-outlined">
            search</span>
        </button>
      </header>

      <section class="weather-info" style="display: none;">
        <div class="location-date-container">
          <div class="location">
            <span class="material-symbols-outlined">
              location_on</span>
               <h4 class="country-txt">Gurugram</h4>
          </div>
          <h5 class="current-date-txt regular-txt">Web , 11 MArch</h5>
        </div>

        <div class="weather-summary-container">
        <img src="weather-images/cloud.png" alt="" class="weather-summary-img" >
        <div class="weather-summary">
        <h1 class="temp-txt">29 °C</h1>
        <h3 class="condition-txt regular-txt">Clouds</h3>
        </div>
        </div>

        <div class="weather-condition-container">
          <div class="condition-item">
            <span class="material-symbols-outlined">
              humidity_low
            </span>
            <div class="condition-info">
              <h5 class="regular-txt">Humidity</h5>
              <h5 class="humidity-value-txt">55%</h5>
            </div>
          </div>

          <div class="condition-item">
            <span class="material-symbols-outlined">
              air
            </span>
            <div class="condition-info">
              <h5 class="regular-txt">Wind Speed</h5>
              <h5 class="wind-value-txt">2 M/s</h5>
            </div>
          </div>
        </div>

        <div class="forcaste-item-container">
          <div class="forcaste-item">
            <h5 class="forcaste-item-date regular-txt">12 March</h5>
            <img src="weather-images/raining.png" class="forcaste-item-img">
            <h5 class="forcaste-item-temp">29 °C</h5>
          </div>

          <div class="forcaste-item">
            <h5 class="forcaste-item-date regular-txt">12 March</h5>
            <img src="weather-images/raining.png" class="forcaste-item-img">
            <h5 class="forcaste-item-temp">29 °C</h5>
          </div>

          <div class="forcaste-item">
            <h5 class="forcaste-item-date regular-txt">12 March</h5>
            <img src="weather-images/raining.png" class="forcaste-item-img">
            <h5 class="forcaste-item-temp">29 °C</h5>
          </div>

          <div class="forcaste-item">
            <h5 class="forcaste-item-date regular-txt">12 March</h5>
            <img src="weather-images/raining.png" class="forcaste-item-img">
            <h5 class="forcaste-item-temp">29 °C</h5>
          </div>
        </div>
      </section>


      <section class="search-city section-messege">
       <img src="weather-images/search.avif">
       <div>
        <h1>Search City</h1>
        <h4 class="regular-txt">
          Find out the Weather conditions of city
        </h4>
       </div>
      </section>

      <section class="not-found section-messege" style="display: none;">
       <img src="weather-images/404.png">
       <div>
        <h1>Search City</h1>
        <h4 class="regular-txt">
          Find out the Weather conditions of city
        </h4>
       </div>
      </section>
    </main>
    
</body>
</html>
